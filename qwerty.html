<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkON – secure chat & calls</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════
   SITE DESIGN TOKENS  (mirrors site)
══════════════════════════════════════════════════ */
:root {
  --site-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --site-glass-bg: rgba(255,255,255,0.18);
  --site-glass-border: rgba(255,255,255,0.3);
  --site-glass-hover: rgba(255,255,255,0.28);
  --site-shadow: 0 2px 8px rgba(0,0,0,0.15);
  --site-shadow-lg: 0 8px 32px rgba(0,0,0,0.25);
  --site-radius: 8px;
  --site-radius-lg: 16px;

  /* TalkON app palette */
  --bg0:    #0d0d14;
  --bg1:    #13131f;
  --bg2:    #1a1a2e;
  --bg3:    #22223a;
  --bg4:    #2a2a45;
  --line:   #2e2e4a;
  --muted:  #4a4a6a;
  --sub:    #7a7a9a;
  --text:   #c8c8e8;
  --bright: #e8e8ff;
  --accent: #667eea;
  --accentl:#8fa8f5;
  --green:  #4ade80;
  --red:    #f87171;
  --yellow: #fbbf24;
  --cyan:   #22d3ee;
  --pink:   #f472b6;
  --r:      10px;
  --r-sm:   6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
  background: var(--site-gradient);
  color: white;
  min-height: 100vh;
  overflow: hidden;
  transition: background 0.5s;
}
body.dark  { background: #1a1a1a; }
body.light { background: #ffffff; color: #202124; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

/* site nav */
.site-nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: 52px; display: flex; align-items: center;
  padding: 0 20px; gap: 14px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--site-glass-border);
  z-index: 50;
  font-family: 'Poppins', sans-serif;
}
body.dark  .site-nav { background: rgba(0,0,0,0.35); border-bottom-color: rgba(255,255,255,0.08); }
body.light .site-nav { background: rgba(255,255,255,0.85); border-bottom-color: rgba(0,0,0,0.08); }

.site-nav-logo { font-size: 15px; font-weight: 700; color: inherit; text-decoration: none; flex:1; }
.site-nav-link {
  padding: 7px 16px; background: var(--site-glass-bg); border: 1px solid var(--site-glass-border);
  border-radius: var(--site-radius); color: inherit; text-decoration: none; font-size: 0.88rem; font-weight: 500;
  transition: all 0.3s ease; cursor: pointer;
}
.site-nav-link:hover { background: var(--site-glass-hover); transform: translateY(-1px); }
body.light .site-nav-link { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: #202124; }

.site-nav-avatar {
  width: 34px; height: 34px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.6);
  object-fit: cover; cursor: pointer; transition: 0.2s;
}
.site-nav-avatar:hover { transform: scale(1.08); }

/* Login box (glass) */
#login-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  z-index: 40; padding-top: 52px;
}
.login-box {
  width: 400px; background: var(--site-glass-bg); border: 1px solid var(--site-glass-border);
  border-radius: var(--site-radius-lg); backdrop-filter: blur(20px);
  box-shadow: var(--site-shadow-lg); animation: loginIn .4s ease;
}
body.dark .login-box { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }
body.light .login-box { background: rgba(255,255,255,0.88); border-color: rgba(0,0,0,0.08); }

@keyframes loginIn { from { opacity:0; transform: translateY(22px) scale(.97); } to { opacity:1; transform: translateY(0) scale(1); } }

.login-header { padding: 30px 30px 22px; text-align: center; border-bottom: 1px solid var(--site-glass-border); font-family: 'Poppins', sans-serif; }
.login-logo { font-size: 26px; font-weight: 700; color: #fff; }
body.light .login-logo { color: #202124; }
.login-logo span { color: #c4b5fd; }
.login-sub { font-size: 11px; color: rgba(255,255,255,0.65); }
body.light .login-sub { color: rgba(0,0,0,0.45); }
.login-body { padding: 24px 28px; }
.field-group { margin-bottom: 14px; }
.field-group label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 6px; display: block; }
body.light .field-group label { color: rgba(0,0,0,0.45); }
input {
  width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
  border-radius: var(--site-radius); padding: 10px 14px; color: #fff; font-size: 13px; outline: none;
}
body.light input { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.12); color: #202124; }
input:focus { border-color: rgba(255,255,255,0.6); box-shadow: 0 0 0 3px rgba(255,255,255,0.12); }
.login-status { font-size: 12px; text-align: center; min-height: 18px; margin-bottom: 12px; }
.login-status.err { color: #fca5a5; }
.login-status.ok  { color: #86efac; }
.login-btns { display: flex; gap: 8px; }
button { font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; border-radius: var(--site-radius); transition: 0.15s; }
.btn-primary { flex:1; padding: 11px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; font-weight: 600; }
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-secondary { flex:1; padding: 11px; background: var(--site-glass-bg); color: #fff; border: 1px solid var(--site-glass-border); }
body.light .btn-secondary { background: rgba(0,0,0,0.06); color: #202124; }

/* App layout */
#app { display: none; height: 100vh; padding-top: 52px; flex-direction: column; }
#app.visible { display: flex; }
.app-body { display: flex; flex: 1; min-height: 0; }
.sidebar { width: 220px; background: var(--bg1); border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
.app-logo { font-weight: 700; color: var(--bright); flex:1; }
.app-logo span { color: var(--accent); }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background .3s; }
.conn-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sidebar-section { padding: 10px 10px 4px; }
.sidebar-section-label { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; }
.sidebar-add-btn { background: none; border: none; color: var(--muted); cursor: pointer; }
.sidebar-add-btn:hover { color: var(--accent); }
.sidebar-list, .sidebar-users-list { list-style: none; overflow-y: auto; max-height: 160px; }
.sidebar-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: var(--r-sm); cursor: pointer; color: var(--sub); font-size: 12.5px; }
.sidebar-item:hover { background: var(--bg3); color: var(--text); }
.sidebar-item.active { background: var(--bg4); color: var(--accent); }
.sidebar-users-section { flex:1; min-height:0; display: flex; flex-direction: column; padding: 0 10px; overflow: hidden; }
.sidebar-users-list { flex:1; overflow-y: auto; }
.sidebar-me { padding: 10px 12px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 9px; }
.me-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; overflow: hidden; }
.me-name { font-size: 12px; font-weight: 600; color: var(--bright); flex:1; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-area { flex:1; display: flex; flex-direction: column; background: var(--bg0); }
.chat-header { height: 48px; background: var(--bg1); border-bottom: 1px solid var(--line); display: flex; align-items: center; padding: 0 16px; gap: 12px; }
.chat-header-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--bright); flex:1; }
.icon-btn { background: none; border: 1px solid var(--line); border-radius: var(--r-sm); color: var(--sub); padding: 5px 9px; font-size: 12px; cursor: pointer; }
.messages { flex:1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 2px; }
.msg-row { display: flex; align-items: flex-start; gap: 10px; padding: 2px 6px; border-radius: var(--r-sm); }
.msg-row:hover { background: rgba(255,255,255,.02); }
.msg-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--bg4); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; cursor: pointer; overflow: hidden; }
.msg-avatar.ghost { opacity: 0; pointer-events: none; }
.msg-body { flex:1; }
.msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.msg-sender { font-size: 13px; font-weight: 600; cursor: pointer; }
.msg-time { font-size: 10px; color: var(--muted); }
.msg-text { color: var(--text); line-height: 1.55; word-break: break-word; font-size: 13px; }
.msg-actions { opacity: 0; display: flex; gap: 4px; margin-left: auto; }
.msg-row:hover .msg-actions { opacity: 1; }
.like-btn { background: none; border: 1px solid var(--line); border-radius: 12px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
.like-btn.liked { background: rgba(244,114,182,.1); border-color: var(--pink); color: var(--pink); }
.msg-system, .msg-err, .msg-ok { text-align: center; font-size: 11px; padding: 6px; }
.msg-system { color: var(--muted); }
.msg-err { color: var(--red); }
.msg-ok { color: var(--green); }
.msg-dm { background: rgba(102,126,234,.1); border-left: 2px solid var(--accent); padding: 10px 14px; border-radius: 0 var(--r-sm) var(--r-sm) 0; margin: 6px 0; }
.input-bar { padding: 12px 16px; background: var(--bg1); border-top: 1px solid var(--line); display: flex; gap: 10px; }
.msg-input { flex:1; background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); padding: 9px 14px; color: var(--bright); font-family: 'Inter', sans-serif; font-size: 13px; resize: none; outline: none; }
.send-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-radius: var(--r-sm); padding: 9px 18px; font-weight: 600; }
.call-bar { display: none; align-items: center; gap: 12px; padding: 0 16px; height: 40px; background: rgba(74,222,128,.08); border-bottom: 1px solid rgba(74,222,128,.2); font-size: 12px; }
.call-bar.visible { display: flex; }
.call-bar-end { background: var(--red); border: none; border-radius: var(--r-sm); padding: 4px 12px; color: #fff; font-weight: 600; cursor: pointer; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg1); border: 1px solid var(--line); border-radius: 14px; width: 380px; max-width: 90vw; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--line); display: flex; gap: 8px; justify-content: flex-end; }
.ctx-menu { position: fixed; background: var(--bg2); border: 1px solid var(--line); border-radius: 6px; z-index: 300; padding: 4px; min-width: 160px; display: none; }
.ctx-menu.open { display: block; }
.ctx-item { padding: 7px 12px; border-radius: 4px; cursor: pointer; font-size: 12.5px; }
.ctx-item:hover { background: var(--bg4); }
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg2); border-radius: 8px; padding: 10px 16px; font-size: 12px; z-index: 500; opacity: 0; transform: translateY(8px); transition: 0.2s; pointer-events: none; }
#toast.show { opacity: 1; transform: translateY(0); }
.av-0,.av-1,.av-2,.av-3,.av-4,.av-5,.av-6,.av-7,.av-8,.av-9 { background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; }
</style>
</head>

      <div class="sidebar-header"><div class="app-logo">Talk<span>ON</span></div><div class="conn-dot" id="conn-dot"></div></div>
      <div class="sidebar-section"><div class="sidebar-section-label">Rooms <button class="sidebar-add-btn" onclick="openJoinModal()">＋</button></div><ul class="sidebar-list" id="rooms-list"></ul></div>

</div>

<!-- MODALS -->
<div class="modal-overlay" id="dm-modal"><div class="modal"><div class="modal-header"><span>Direct Message</span><button class="modal-close" onclick="closeModal('dm-modal')">×</button></div><div class="modal-body"><input type="text" id="dm-to" placeholder="Username"><textarea id="dm-text" placeholder="Message…" style="margin-top:12px; width:100%; background:var(--bg2); border:1px solid var(--line); border-radius:6px; padding:8px;"></textarea></div><div class="modal-footer"><button class="btn-secondary" onclick="closeModal('dm-modal')">Cancel</button><button class="btn-primary" onclick="sendDm()">Send DM</button></div></div></div>

<script>
// ========== AUTH.JS (modified to respect talkon_host/talkon_port cookies) ==========
(function(){
  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)"));
    return match ? decodeURIComponent(match[1]) : null;
  }
  function setCookie(name, value, days=365) { document.cookie = `${name}=${encodeURIComponent(value)}; expires=${new Date(Date.now()+days*864e5).toUTCString()}; path=/; SameSite=Lax`; }
  function deleteCookie(name) { document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/`; }
  function getServerAddress() {
    let host = getCookie('talkon_host') || 'wss://talkon.duckdns.org';
    let port = parseInt(getCookie('talkon_port')) || 8765;
    if (host.startsWith('ws://') || host.startsWith('wss://')) return host.includes(':') ? host : `${host}:${port}`;
    return `wss://${host}:${port}`;
  }
  const WS_URL = getServerAddress();
  const COOKIE_USER = "talkon_user", COOKIE_PASS = "talkon_pass";

  function _replaceAvatars(base64png) {
    if(!base64png) return;
    const src = `data:image/png;base64,${base64png}`;
    ["#nav-avatar","#user-avatar","#header-avatar",".user-avatar",".avatar-img","[data-avatar-placeholder]"].forEach(sel => {
      document.querySelectorAll(sel).forEach(el => { if(el.tagName==="IMG") el.src=src; else { el.style.backgroundImage=`url('${src}')`; el.style.backgroundSize="cover"; } });
    });
    window._talkon_avatar_b64 = base64png;
    try { sessionStorage.setItem("talkon_avatar", base64png); } catch(e) {}
  }

  function _wsAction(action, username, password) {
    return new Promise((resolve, reject) => {
      const ws = new WebSocket(WS_URL);
      let banner=false;
      const timeout=setTimeout(()=>{ ws.close(); reject("Timeout"); },8000);
      ws.onmessage = (e) => {
        let msg; try{ msg=JSON.parse(e.data); }catch{ return; }
        if(!banner && msg.type==="banner") { banner=true; ws.send(JSON.stringify({action,username,password})); return; }
        if(banner){
          if(msg.type==="ok") { clearTimeout(timeout); resolve({ ws, text: msg.text }); }
          else if(msg.type==="error") { clearTimeout(timeout); ws.close(); reject(msg.text); }
        }
      };
      ws.onerror=()=>{ clearTimeout(timeout); reject("Connection error"); };
    });
  }

  window.TalkONAuth = {
    async login(username,password){
      username=username.trim();
      if(!username||!password) throw "Username/password required";
      const {ws,text}=await _wsAction("login",username,password);
      setCookie(COOKIE_USER,username); setCookie(COOKIE_PASS,password);
      ws.addEventListener("message",(ev)=>{
        let m; try{ m=JSON.parse(ev.data); }catch{return;}
        if(m.type==="avatar" && m.username===username && m.data) _replaceAvatars(m.data);
      });
      setTimeout(()=>ws.close(),1500);
      return text;
    },
    async register(username,password){
      username=username.trim();
      if(!username||!password) throw "Username/password required";
      if(password.length<4) throw "Password ≥4 chars";
      const {ws,text}=await _wsAction("register",username,password);
      ws.close();
      return text;
    },
    logout(){ deleteCookie(COOKIE_USER); deleteCookie(COOKIE_PASS); try{ sessionStorage.removeItem("talkon_avatar"); }catch{} },
    isLoggedIn(){ return !!(getCookie(COOKIE_USER) && getCookie(COOKIE_PASS)); },
    getUsername(){ return getCookie(COOKIE_USER); },
    getAvatarCache(){ try{ return sessionStorage.getItem("talkon_avatar"); }catch{ return null; } }
  };
  // auto-restore avatar on page load
  const cachedAv = (()=>{ try{ return sessionStorage.getItem("talkon_avatar"); }catch{ return null; } })();
  if(cachedAv) _replaceAvatars(cachedAv);
})();
</script>

<script>
// ========== MAIN CHAT CLIENT (integrated with auth.js) ==========
let ws = null, username = '', currentRoom = 'general', pendingAction = null, pendingUser = '', pendingPass = '';
let avatarCache = {}, rooms = new Set(['general']), users = [], lastSender = null;
let callState = null, callTimer = null, callSeconds = 0;
let audioCtx = null, micStream = null, micSource = null, scriptNode = null, sampleBuffer = new Float32Array(0), nextPlayTime = 0;
const CALL_SAMPLE_RATE = 16000, CALL_CHUNK_SAMPLES = 320;

function getServerAddress() {
  const host = getCookie('talkon_host') || 'wss://talkon.duckdns.org';
  const port = parseInt(getCookie('talkon_port')) || 8765;
  return { host, port };
}
function getCookie(name) { const m = document.cookie.match(new RegExp("(?:^|; )" + name + "=([^;]*)")); return m ? decodeURIComponent(m[1]) : null; }
function setLoginStatus(text, err) { const el = document.getElementById('l-status'); el.textContent = text; el.className = 'login-status' + (err ? ' err' : err===false ? ' ok' : ''); }
function setLoginBtns(loading) { document.getElementById('l-login-btn').disabled = loading; document.getElementById('l-reg-btn').disabled = loading; document.getElementById('l-login-btn').textContent = loading ? 'Connecting…' : 'Login'; }
function toast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500); }

async function doLogin() {
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!user || !pass) { setLoginStatus('Fill all fields', true); return; }
  setLoginBtns(true); setLoginStatus('Authenticating…');
  try {
    await TalkONAuth.login(user, pass);
    setLoginStatus('Logged in! Starting chat…', false);
    pendingAction = 'login'; pendingUser = user; pendingPass = pass;
    const { host, port } = getServerAddress();
    connect(host, port);
  } catch(err) { setLoginStatus(String(err), true); setLoginBtns(false); }
}

async function doRegister() {
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!user || !pass) { setLoginStatus('Fill all fields', true); return; }
  if(pass.length<4) { setLoginStatus('Password ≥4 chars', true); return; }
  setLoginBtns(true); setLoginStatus('Creating account…');
  try {
    await TalkONAuth.register(user, pass);
    setLoginStatus('Registered! You can now log in.', false);
    document.getElementById('l-pass').value = '';
  } catch(err) { setLoginStatus(String(err), true); }
  setLoginBtns(false);
}

function doLogout() { if(ws) ws.close(); TalkONAuth.logout(); username=''; currentRoom='general'; rooms=new Set(['general']); users=[]; avatarCache={}; callState=null; clearInterval(callTimer); document.getElementById('app').classList.remove('visible'); document.getElementById('login-screen').style.display='flex'; document.getElementById('messages').innerHTML=''; document.getElementById('rooms-list').innerHTML=''; document.getElementById('users-list').innerHTML=''; setLoginBtns(false); setLoginStatus(''); }

function connect(host, port) {
  const url = `ws://${host}:${port}`;
  ws = new WebSocket(url);
  ws.onopen = () => setConnDot(true);
  ws.onclose = () => { setConnDot(false); if(username) appendSystem('⚠ Disconnected'); };
  ws.onerror = () => { if(pendingAction) { setLoginStatus('Connection failed', true); setLoginBtns(false); } };
  ws.onmessage = (evt) => { try { handlePacket(JSON.parse(evt.data)); } catch {}; };
}
function send(obj) { if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify(obj)); }
function handlePacket(msg) {
  switch(msg.type){
    case 'banner': if(pendingAction==='login') send({ action:'login', username:pendingUser, password:pendingPass }); else if(pendingAction==='register') send({ action:'register', username:pendingUser, password:pendingPass }); break;
    case 'ok': if(pendingAction==='register'){ setLoginStatus('Registered! Logging in…',false); pendingAction='login'; const{host,port}=getServerAddress(); connect(host,port); return; } if(pendingAction==='login'){ username=pendingUser; showApp(); pendingAction=null; return; } appendOk(msg.text); break;
    case 'error': if(pendingAction){ setLoginStatus(msg.text,true); setLoginBtns(false); ws.close(); return; } appendError(msg.text); break;
    case 'message': appendMessage(msg.sender,msg.text,msg.ts,msg.id??-1,msg.likes??0,msg.liked_by_me??false); break;
    case 'system': appendSystem(msg.text); break;
    case 'dm': appendDm(msg.sender,msg.text,msg.ts,false); break;
    case 'dm_sent': appendOk(`✓ DM sent to ${msg.to}`); break;
    case 'history': appendHistorySep(msg.room); (msg.messages||[]).forEach(m=>appendMessage(m.sender,m.content,m.ts,m.id,m.likes??0,m.liked_by_me??false,true)); appendHistorySep(null); break;
    case 'rooms': renderRooms(msg.rooms||[]); break;
    case 'users': renderUsers(msg.users||[]); break;
    case 'avatar': storeAvatar(msg.username,msg.data); break;
    case 'like_update': updateLikes(msg.id,msg.likes,msg.liked_by_me); break;
    case 'profile': showProfile(msg); break;
    case 'call_ringing': callState={callId:msg.call_id, peer:msg.to, state:'ringing'}; showCallBar('ringing',msg.to); break;
    case 'call_incoming': if(callState){ send({action:'call_reject', call_id:msg.call_id}); return; } callState={callId:msg.call_id, peer:msg.caller, state:'ringing'}; showIncomingCall(msg.call_id,msg.caller); break;
    case 'call_accepted': if(callState){ callState.state='active'; startCallTimer(); showCallBar('active',callState.peer); closeModal('call-modal'); startAudio(); } break;
    case 'call_rejected': endCall(); toast(`Call rejected by ${msg.by}`); break;
    case 'call_ended': endCall(); toast('Call ended'); appendSystem('📵 Call ended'); break;
    case 'audio_data': receiveAudioChunk(msg.call_id,msg.data); break;
  }
}
function showApp(){ document.getElementById('login-screen').style.display='none'; document.getElementById('app').classList.add('visible'); document.getElementById('me-name').textContent=username; setMeAvatar(username); setConnDot(true); document.getElementById('msg-input').placeholder=`Message #${currentRoom}…`; send({action:'rooms'}); }
function setConnDot(on){ document.getElementById('conn-dot').className='conn-dot'+(on?' online':''); }
function appendMessage(sender,text,ts,id,likes,likedByMe){ /* rendering same as original – simplified */ const container=document.getElementById('messages'); const row=document.createElement('div'); row.className='msg-row'; const avWrap=document.createElement('div'); avWrap.className='msg-avatar'+(sender!==lastSender?'':' ghost'); if(sender!==lastSender){ avWrap.className+=' '+avClass(sender); avWrap.textContent=initials(sender); avWrap.onclick=()=>openProfile(sender); if(avatarCache[sender]) avWrap.innerHTML=`<img src="${avatarCache[sender]}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`; } const body=document.createElement('div'); body.className='msg-body'; if(sender!==lastSender){ const meta=document.createElement('div'); meta.className='msg-meta'; const sEl=document.createElement('span'); sEl.className='msg-sender'; sEl.style.color=senderColor(sender); sEl.textContent=sender; sEl.onclick=()=>openProfile(sender); const tEl=document.createElement('span'); tEl.className='msg-time'; tEl.textContent=fmtTs(ts); meta.appendChild(sEl); meta.appendChild(tEl); body.appendChild(meta); } const txt=document.createElement('div'); txt.className='msg-text'; txt.textContent=text; body.appendChild(txt); const actions=document.createElement('div'); actions.className='msg-actions'; if(id>=0){ const btn=document.createElement('button'); btn.className='like-btn'+(likedByMe?' liked':''); btn.innerHTML=`❤ ${likes>0?likes:''}`; btn.dataset.id=id; btn.onclick=()=>send({action:'like_message',id}); actions.appendChild(btn); } row.appendChild(avWrap); row.appendChild(body); row.appendChild(actions); container.appendChild(row); scrollBottom(); lastSender=sender; }
function appendSystem(text){ lastSender=null; const el=document.createElement('div'); el.className='msg-system'; el.textContent=text; document.getElementById('messages').appendChild(el); scrollBottom(); }
function appendDm(sender,text,ts,sent){ lastSender=null; const el=document.createElement('div'); el.className='msg-dm'; el.innerHTML=`<div class="dm-label">DM ${sent?'→':'←'} ${escapeHtml(sender)}</div><div>${escapeHtml(text)}</div>`; document.getElementById('messages').appendChild(el); scrollBottom(); }
function appendOk(t){ const e=document.createElement('div'); e.className='msg-ok'; e.textContent=t; document.getElementById('messages').appendChild(e); scrollBottom(); }
function appendError(t){ const e=document.createElement('div'); e.className='msg-err'; e.textContent='⚠ '+t; document.getElementById('messages').appendChild(e); scrollBottom(); }
function appendHistorySep(r){ lastSender=null; const e=document.createElement('div'); e.className='msg-history-sep'; e.textContent=r?`— History: #${r} —`:'— End of history —'; document.getElementById('messages').appendChild(e); }
function updateLikes(id,likes,likedByMe){ document.querySelectorAll(`.like-btn[data-id="${id}"]`).forEach(btn=>{ btn.className='like-btn'+(likedByMe?' liked':''); btn.innerHTML=`❤ ${likes>0?likes:''}`; }); }
function renderRooms(list){ list.forEach(r=>rooms.add(r)); const ul=document.getElementById('rooms-list'); ul.innerHTML=''; [...rooms].sort().forEach(r=>{ const li=document.createElement('li'); li.className='sidebar-item'+(r===currentRoom?' active':''); li.innerHTML=`<span>#</span> ${escapeHtml(r)}`; li.onclick=()=>switchRoom(r); li.oncontextmenu=e=>{e.preventDefault(); showRoomCtx(e,r);}; ul.appendChild(li); }); }
function renderUsers(list){ users=list; const ul=document.getElementById('users-list'); ul.innerHTML=''; list.forEach(u=>{ const li=document.createElement('li'); li.className='sidebar-item'; const av=document.createElement('div'); av.style.cssText='width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;'; av.className=avClass(u); av.textContent=initials(u); if(avatarCache[u]) av.innerHTML=`<img src="${avatarCache[u]}" style="width:100%;height:100%;object-fit:cover;">`; const span=document.createElement('span'); span.textContent=u; li.appendChild(av); li.appendChild(span); li.onclick=()=>openProfile(u); li.oncontextmenu=e=>{e.preventDefault(); showUserCtx(e,u);}; ul.appendChild(li); if(!avatarCache[u]) send({action:'get_avatar',username:u}); }); }
function switchRoom(room){ currentRoom=room; lastSender=null; document.getElementById('chat-title').textContent=`# ${room}`; document.getElementById('msg-input').placeholder=`Message #${room}…`; document.getElementById('messages').innerHTML=''; renderRooms([]); send({action:'join',room}); }
function openJoinModal(){ openModal('join-modal'); setTimeout(()=>document.getElementById('join-room-input').focus(),50); }
function joinRoom(){ const room=document.getElementById('join-room-input').value.trim().toLowerCase().replace(/\s+/g,'-'); if(!room) return; rooms.add(room); closeModal('join-modal'); document.getElementById('join-room-input').value=''; switchRoom(room); }
function refreshUsers(){ send({action:'users'}); }
function sendMessage(){ const input=document.getElementById('msg-input'); const text=input.value.trim(); if(!text) return; appendMessage(username,text,new Date().toISOString(),-1,0,false); send({action:'message',text}); input.value=''; autoResize(input); }
function onInputKey(e){ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function openDmModal(prefill){ openModal('dm-modal'); if(prefill) document.getElementById('dm-to').value=prefill; setTimeout(()=>{ if(prefill) document.getElementById('dm-text').focus(); else document.getElementById('dm-to').focus(); },50); }
function sendDm(){ const to=document.getElementById('dm-to').value.trim(); const text=document.getElementById('dm-text').value.trim(); if(!to||!text) return; send({action:'dm',to,text}); appendDm(to,text,new Date().toISOString(),true); document.getElementById('dm-text').value=''; closeModal('dm-modal'); }
function openProfile(user){ send({action:'get_profile',username:user}); document.getElementById('profile-name').textContent=user; document.getElementById('profile-date').textContent='Loading…'; document.getElementById('profile-bio-view').textContent=''; document.getElementById('profile-posts').innerHTML='<div style="color:var(--muted);">Loading…</div>'; const av=document.getElementById('profile-avatar'); av.className='profile-avatar '+avClass(user); av.textContent=initials(user); const isOwn=(user===username); document.getElementById('profile-edit-btn').style.display=isOwn?'':'none'; document.getElementById('profile-save-btn').style.display='none'; document.getElementById('profile-avatar-btn').style.display=isOwn?'':'none'; document.getElementById('profile-bio-edit').style.display='none'; document.getElementById('profile-bio-view').style.display=''; openModal('profile-modal'); }
function openMyProfile(){ openProfile(username); }
function showProfile(msg){ document.getElementById('profile-name').textContent=msg.username; document.getElementById('profile-date').textContent=`🗓 Joined ${fmtDate(msg.created)}`; document.getElementById('profile-bio-view').textContent=msg.description||'(no bio)'; document.getElementById('profile-bio-edit').value=msg.description||''; const av=document.getElementById('profile-avatar'); if(msg.avatar){ av.innerHTML=`<img src="data:image/png;base64,${msg.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`; storeAvatar(msg.username,msg.avatar); } else { av.className='profile-avatar '+avClass(msg.username); av.textContent=initials(msg.username); } const feed=document.getElementById('profile-posts'); feed.innerHTML=`<div class="profile-posts-label">Recent Posts (${(msg.posts||[]).length})</div>`; if(!msg.posts||!msg.posts.length){ feed.innerHTML+='<div style="color:var(--muted);">No posts yet.</div>'; return; } [...msg.posts].reverse().forEach(p=>{ const card=document.createElement('div'); card.className='post-card'; card.innerHTML=`<div>in #${escapeHtml(p.room)} · ${fmtDate(p.ts)}</div><div>${escapeHtml(p.content)}</div>`; feed.appendChild(card); }); }
function toggleBioEdit(){ const view=document.getElementById('profile-bio-view'); const edit=document.getElementById('profile-bio-edit'); const save=document.getElementById('profile-save-btn'); const editBtn=document.getElementById('profile-edit-btn'); const editing=edit.style.display!=='none'; view.style.display=editing?'':'none'; edit.style.display=editing?'none':''; save.style.display=editing?'none':''; editBtn.textContent=editing?'Edit':'Cancel'; }
function saveBio(){ const bio=document.getElementById('profile-bio-edit').value.trim(); send({action:'set_profile',description:bio}); document.getElementById('profile-bio-view').textContent=bio||'(no bio)'; toggleBioEdit(); toast('Bio saved!'); }
function triggerAvatarUpload(){ document.getElementById('avatar-upload').click(); }
function uploadAvatar(input){ const file=input.files[0]; if(!file||file.type!=='image/png'){ toast('PNG only'); return; } if(file.size>192*1024){ toast('Max 192KB'); return; } const reader=new FileReader(); reader.onload=e=>{ const b64=e.target.result.split(',')[1]; send({action:'set_avatar',data:b64}); storeAvatarB64(username,b64); setMeAvatar(username); toast('Avatar updated!'); try{ sessionStorage.setItem('talkon_avatar',b64); }catch{} }; reader.readAsDataURL(file); input.value=''; }
function storeAvatar(user,b64){ if(!b64) return; storeAvatarB64(user,b64); }
function storeAvatarB64(user,b64){ const src=`data:image/png;base64,${b64}`; avatarCache[user]=src; document.querySelectorAll(`[data-av-user="${user}"]`).forEach(el=>{ el.innerHTML=`<img src="${src}" style="width:100%;height:100%;object-fit:cover;">`; }); if(user===username) setMeAvatar(username); }
function setMeAvatar(user){ const el=document.getElementById('me-avatar'); if(avatarCache[user]){ el.innerHTML=`<img src="${avatarCache[user]}">`; } else { el.className='me-avatar '+avClass(user); el.textContent=initials(user); } }
// AUDIO & CALL (simplified – kept same logic)
async function startAudio(){ /* same engine */ try{ audioCtx=new AudioContext({sampleRate:CALL_SAMPLE_RATE}); await audioCtx.resume(); micStream=await navigator.mediaDevices.getUserMedia({audio:{sampleRate:CALL_SAMPLE_RATE,channelCount:1}}); micSource=audioCtx.createMediaStreamSource(micStream); scriptNode=audioCtx.createScriptProcessor(1024,1,1); scriptNode.onaudioprocess=(e)=>{ if(!callState||callState.state!=='active') return; const input=e.inputBuffer.getChannelData(0); const merged=new Float32Array(sampleBuffer.length+input.length); merged.set(sampleBuffer); merged.set(input,sampleBuffer.length); sampleBuffer=merged; while(sampleBuffer.length>=CALL_CHUNK_SAMPLES){ const chunk=sampleBuffer.slice(0,CALL_CHUNK_SAMPLES); sampleBuffer=sampleBuffer.slice(CALL_CHUNK_SAMPLES); const int16=new Int16Array(chunk.length); for(let i=0;i<chunk.length;i++){ let s=Math.max(-1,Math.min(1,chunk[i])); int16[i]=s<0?s*0x8000:s*0x7FFF; } send({action:'audio_data',call_id:callState.callId,data:btoa(String.fromCharCode(...new Uint8Array(int16.buffer)))}); } }; micSource.connect(scriptNode); scriptNode.connect(audioCtx.destination); nextPlayTime=audioCtx.currentTime+0.08; appendSystem('🎙 Audio ready'); }catch(e){ appendError('Mic error'); endCall(); } }
function receiveAudioChunk(callId,b64){ if(!callState||callState.callId!==callId||callState.state!=='active') return; if(!audioCtx) return; const bin=atob(b64); const buf=new ArrayBuffer(bin.length); const view=new Uint8Array(buf); for(let i=0;i<bin.length;i++) view[i]=bin.charCodeAt(i); const int16=new Int16Array(buf); const float32=new Float32Array(int16.length); for(let i=0;i<int16.length;i++) float32[i]=int16[i]/(int16[i]<0?0x8000:0x7FFF); const buffer=audioCtx.createBuffer(1,float32.length,CALL_SAMPLE_RATE); buffer.copyToChannel(float32,0); const src=audioCtx.createBufferSource(); src.buffer=buffer; src.connect(audioCtx.destination); const now=audioCtx.currentTime; if(nextPlayTime<now+0.01) nextPlayTime=now+0.05; src.start(nextPlayTime); nextPlayTime+=buffer.duration; }
function stopAudio(){ sampleBuffer=new Float32Array(0); if(scriptNode){ scriptNode.disconnect(); scriptNode.onaudioprocess=null; } if(micSource) micSource.disconnect(); if(micStream) micStream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close(); audioCtx=null; }
function initiateCall(user){ if(callState){ toast('Already in a call'); return; } send({action:'call_invite',to:user}); callState={peer:user,state:'ringing',callId:null}; showCallBar('ringing',user); toast(`Calling ${user}…`); }
function showIncomingCall(callId,caller){ document.getElementById('call-modal-caller').textContent=caller; openModal('call-modal'); }
function acceptCall(){ if(!callState) return; send({action:'call_accept',call_id:callState.callId}); closeModal('call-modal'); }
function rejectCall(){ if(!callState) return; send({action:'call_reject',call_id:callState.callId}); callState=null; closeModal('call-modal'); }
function hangup(){ if(!callState) return; send({action:'call_hangup',call_id:callState.callId}); endCall(); appendSystem('📵 Call ended'); }
function endCall(){ stopAudio(); callState=null; clearInterval(callTimer); callTimer=null; callSeconds=0; document.getElementById('call-bar').classList.remove('visible'); }
function showCallBar(state,peer){ const bar=document.getElementById('call-bar'); bar.classList.add('visible'); document.getElementById('call-bar-label').textContent=state==='ringing'?`📳 Calling ${peer}…`:`📞 In call with ${peer}`; }
function startCallTimer(){ callSeconds=0; const timerEl=document.getElementById('call-bar-timer'); clearInterval(callTimer); callTimer=setInterval(()=>{ callSeconds++; const m=Math.floor(callSeconds/60); const s=callSeconds%60; timerEl.textContent=`${m}:${s.toString().padStart(2,'0')}`; },1000); }
// context menus, modals, helpers
function showRoomCtx(e,room){ document.getElementById('ctx-menu').innerHTML=`<div class="ctx-item" onclick="switchRoom('${escapeAttr(room)}'); hideCtx()">💬 Switch to #${escapeHtml(room)}</div>`; showCtxAt(e.clientX,e.clientY); }
function showUserCtx(e,user){ const callItem=user!==username?`<div class="ctx-item" onclick="initiateCall('${escapeAttr(user)}'); hideCtx()">📞 Call ${escapeHtml(user)}</div><div class="ctx-item" onclick="openDmModal('${escapeAttr(user)}'); hideCtx()">✉ DM ${escapeHtml(user)}</div>`:''; document.getElementById('ctx-menu').innerHTML=`<div class="ctx-item" onclick="openProfile('${escapeAttr(user)}'); hideCtx()">👤 View Profile</div>${callItem}`; showCtxAt(e.clientX,e.clientY); }
function showCtxAt(x,y){ const m=document.getElementById('ctx-menu'); m.style.left=x+'px'; m.style.top=y+'px'; m.classList.add('open'); }
function hideCtx(){ document.getElementById('ctx-menu').classList.remove('open'); }
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));
document.addEventListener('click',hideCtx);
function scrollBottom(){ const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function fmtTs(iso){ if(!iso) return ''; const d=new Date(iso); return isNaN(d)?iso:d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso.length>10?iso:iso+'T00:00:00Z'); return isNaN(d)?iso.slice(0,10):d.toLocaleDateString(undefined,{year:'numeric',month:'long',day:'numeric'}); }
function initials(n){ if(!n) return '?'; const p=n.split(/\s+/); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase(); }
const AV_COLORS=['av-0','av-1','av-2','av-3','av-4','av-5','av-6','av-7','av-8','av-9']; function avClass(n){ let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))|0; return AV_COLORS[Math.abs(h)%AV_COLORS.length]; }
const SENDER_COLORS=['#a395ff','#22d3ee','#4ade80','#f472b6','#fbbf24','#f87171','#818cf8','#34d399','#fb923c','#e879f9']; function senderColor(n){ let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))|0; return SENDER_COLORS[Math.abs(h)%SENDER_COLORS.length]; }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s){ return String(s).replace(/'/g,"\\'"); }
document.getElementById('l-login-btn').onclick=doLogin; document.getElementById('l-reg-btn').onclick=doRegister;
document.getElementById('l-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('l-user').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('l-pass').focus(); });
// auto restore session
document.addEventListener('DOMContentLoaded',()=>{
  const savedTheme=getCookie('theme')||'gradient'; applyTheme(savedTheme);
  if(TalkONAuth.isLoggedIn()){
    const user=TalkONAuth.getUsername(); const pass=getCookie('talkon_pass');
    if(user&&pass){ pendingAction='login'; pendingUser=user; pendingPass=pass; const{host,port}=getServerAddress(); connect(host,port); setLoginStatus('Auto-reconnecting…',false); }
  }
});
function applyTheme(theme){ document.body.classList.remove('dark','light'); if(theme==='dark') document.body.classList.add('dark'); else if(theme==='light') document.body.classList.add('light'); else document.body.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'; }
</script>
</body>
