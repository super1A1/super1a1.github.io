<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TalkON</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════
   SITE DESIGN TOKENS  (from super1a1.github.io)
══════════════════════════════════════════════════ */
:root {
  /* Site palette */
  --site-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --site-glass-bg: rgba(255,255,255,0.18);
  --site-glass-border: rgba(255,255,255,0.3);
  --site-glass-hover: rgba(255,255,255,0.28);
  --site-shadow: 0 2px 8px rgba(0,0,0,0.15);
  --site-shadow-lg: 0 8px 32px rgba(0,0,0,0.25);
  --site-radius: 8px;
  --site-radius-lg: 16px;
  --site-radius-pill: 50px;

  /* TalkON app colours */
  --bg0:    #0d0d14;
  --bg1:    #13131f;
  --bg2:    #1a1a2e;
  --bg3:    #22223a;
  --bg4:    #2a2a45;
  --line:   #2e2e4a;
  --muted:  #4a4a6a;
  --sub:    #7a7a9a;
  --text:   #c8c8e8;
  --bright: #e8e8ff;
  /* Accent shifted to match site purple */
  --accent: #667eea;
  --accentl:#8fa8f5;
  --green:  #4ade80;
  --red:    #f87171;
  --yellow: #fbbf24;
  --cyan:   #22d3ee;
  --pink:   #f472b6;
  --r:      10px;
  --r-sm:   6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════════════════════════
   SITE THEME SYSTEM  (mirrors index/search/settings)
══════════════════════════════════════════════════ */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
  background: var(--site-gradient);
  color: white;
  min-height: 100vh;
  overflow: hidden;
  transition: background 0.5s, color 0.5s;
}
body.dark  { background: #1a1a1a; color: #fff; }
body.light { background: #ffffff; color: #202124; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ══════════════════════════════════════════════════
   SITE NAV BAR  (consistent with site pages)
══════════════════════════════════════════════════ */
.site-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--site-glass-border);
  z-index: 50;
  font-family: 'Poppins', sans-serif;
  transition: background 0.5s;
}
body.dark  .site-nav { background: rgba(0,0,0,0.35); border-bottom-color: rgba(255,255,255,0.08); }
body.light .site-nav { background: rgba(255,255,255,0.85); border-bottom-color: rgba(0,0,0,0.08); }

.site-nav-logo {
  font-size: 15px;
  font-weight: 700;
  color: inherit;
  text-decoration: none;
  letter-spacing: 0.3px;
  flex: 1;
}
body.light .site-nav-logo { color: #202124; }

.site-nav-link {
  padding: 7px 16px;
  background: var(--site-glass-bg);
  border: 1px solid var(--site-glass-border);
  border-radius: var(--site-radius);
  color: inherit;
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 500;
  transition: all 0.3s ease;
  cursor: pointer;
}
.site-nav-link:hover { background: var(--site-glass-hover); transform: translateY(-1px); }
body.light .site-nav-link { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.1); color: #202124; }
body.light .site-nav-link:hover { background: rgba(0,0,0,0.1); }

.site-nav-avatar {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.6);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  object-fit: cover;
  cursor: pointer;
  transition: all 0.3s ease;
}
.site-nav-avatar:hover { transform: scale(1.08); box-shadow: 0 4px 14px rgba(0,0,0,0.35); }

/* ══════════════════════════════════════════════════
   LOGIN SCREEN  — site glass-card style
══════════════════════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 40;
  padding-top: 52px; /* clear site nav */
}

.login-box {
  width: 400px;
  background: var(--site-glass-bg);
  border: 1px solid var(--site-glass-border);
  border-radius: var(--site-radius-lg);
  backdrop-filter: blur(20px);
  box-shadow: var(--site-shadow-lg);
  overflow: hidden;
  animation: loginIn .4s cubic-bezier(.16,1,.3,1);
}
body.dark  .login-box { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }
body.light .login-box { background: rgba(255,255,255,0.88); border-color: rgba(0,0,0,0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.12); }

@keyframes loginIn {
  from { opacity:0; transform: translateY(22px) scale(.97); }
  to   { opacity:1; transform: translateY(0)    scale(1); }
}

.login-header {
  padding: 30px 30px 22px;
  text-align: center;
  border-bottom: 1px solid var(--site-glass-border);
  background: rgba(255,255,255,0.06);
  font-family: 'Poppins', sans-serif;
}
body.dark  .login-header { border-bottom-color: rgba(255,255,255,0.08); }
body.light .login-header { border-bottom-color: rgba(0,0,0,0.07); background: rgba(102,126,234,0.07); }

.login-logo {
  font-family: 'Poppins', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.15);
}
body.light .login-logo { color: #202124; }
.login-logo span { color: #c4b5fd; }
body.light .login-logo span { color: #667eea; }

.login-sub {
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.65);
  letter-spacing: .06em;
}
body.light .login-sub { color: rgba(0,0,0,0.45); }

.login-body { padding: 24px 28px; }

.field-group { margin-bottom: 14px; }

.field-group label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
  margin-bottom: 6px;
  font-family: 'Poppins', sans-serif;
}
body.light .field-group label { color: rgba(0,0,0,0.45); }

.field-row { display: flex; gap: 8px; }

input[type=text], input[type=password] {
  width: 100%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: var(--site-radius);
  padding: 10px 14px;
  color: #fff;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
  backdrop-filter: blur(4px);
}
body.dark input[type=text], body.dark input[type=password] {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.12);
  color: #e8e8ff;
}
body.light input[type=text], body.light input[type=password] {
  background: rgba(255,255,255,0.9);
  border-color: rgba(0,0,0,0.12);
  color: #202124;
}
input[type=text]::placeholder, input[type=password]::placeholder { color: rgba(255,255,255,0.4); }
body.light input[type=text]::placeholder, body.light input[type=password]::placeholder { color: #999; }
input[type=text]:focus, input[type=password]:focus {
  border-color: rgba(255,255,255,0.6);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.22);
}
body.light input[type=text]:focus, body.light input[type=password]:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
  background: #fff;
}
input.port { width: 90px; flex-shrink: 0; }

.login-status {
  font-size: 12px;
  text-align: center;
  min-height: 18px;
  margin-bottom: 12px;
  color: rgba(255,255,255,0.7);
}
.login-status.err { color: #fca5a5; }
.login-status.ok  { color: #86efac; }
body.light .login-status.err { color: #dc2626; }
body.light .login-status.ok  { color: #16a34a; }

.login-btns { display: flex; gap: 8px; }

button {
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  border-radius: var(--site-radius);
  transition: all .15s;
  outline: none;
}

.btn-primary {
  flex: 1;
  padding: 11px 16px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  font-weight: 600;
  box-shadow: 0 2px 8px rgba(102,126,234,0.35);
}
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(102,126,234,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: .5; cursor: default; transform: none; filter: none; }

.btn-secondary {
  flex: 1;
  padding: 11px 16px;
  background: var(--site-glass-bg);
  color: #fff;
  border: 1px solid var(--site-glass-border);
}
.btn-secondary:hover { background: var(--site-glass-hover); }
body.light .btn-secondary { background: rgba(0,0,0,0.06); color: #202124; border-color: rgba(0,0,0,0.1); }
body.light .btn-secondary:hover { background: rgba(0,0,0,0.1); }

/* ══════════════════════════════════════════════════
   MAIN APP LAYOUT
══════════════════════════════════════════════════ */
#app {
  display: none;
  height: 100vh;
  padding-top: 52px; /* clear site nav */
  flex-direction: column;
}
#app.visible { display: flex; }

.app-body {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--bg1);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}

.app-logo {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 15px;
  color: var(--bright);
  flex: 1;
  letter-spacing: -0.3px;
}
.app-logo span { color: var(--accent); }

.conn-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
  transition: background .3s;
}
.conn-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

.sidebar-section { padding: 10px 10px 4px; }

.sidebar-section-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 4px 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Poppins', sans-serif;
}

.sidebar-add-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  border-radius: 3px;
  transition: color .15s;
}
.sidebar-add-btn:hover { color: var(--accent); }

.sidebar-list {
  list-style: none;
  overflow-y: auto;
  max-height: 160px;
}

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--sub);
  font-size: 12.5px;
  transition: background .1s, color .1s;
  user-select: none;
}
.sidebar-item:hover  { background: var(--bg3); color: var(--text); }
.sidebar-item.active { background: var(--bg4); color: var(--accent); }
.sidebar-item-icon   { font-size: 11px; opacity: .6; }

.sidebar-divider {
  height: 1px;
  background: var(--line);
  margin: 8px 10px;
}

/* Users section */
.sidebar-users-section {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding: 0 10px;
  overflow: hidden;
}

.sidebar-users-list {
  list-style: none;
  overflow-y: auto;
  flex: 1;
}

/* Me section at bottom */
.sidebar-me {
  padding: 10px 12px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 9px;
}

.me-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  overflow: hidden;
  cursor: pointer;
}
.me-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.me-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--bright);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
}

/* ── CHAT AREA ── */
.chat-area {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg0);
}

.chat-header {
  height: 48px;
  background: var(--bg1);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}

.chat-header-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--bright);
  flex: 1;
}

.chat-header-actions { display: flex; gap: 6px; }

.icon-btn {
  background: none;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  color: var(--sub);
  padding: 5px 9px;
  font-size: 12px;
  transition: all .15s;
}
.icon-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--muted); }

/* ── MESSAGES ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.msg-group { margin-bottom: 10px; }

.msg-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 2px 6px;
  border-radius: var(--r-sm);
  transition: background .1s;
}
.msg-row:hover { background: rgba(255,255,255,.02); }
.msg-row:hover .msg-actions { opacity: 1; }

.msg-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--bg4);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  overflow: hidden;
  margin-top: 2px;
  cursor: pointer;
}
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.msg-avatar.ghost { opacity: 0; pointer-events: none; }

.msg-body  { flex: 1; min-width: 0; }

.msg-meta {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 2px;
}

.msg-sender {
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.msg-sender:hover { text-decoration: underline; }

.msg-time {
  font-size: 10px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.msg-text {
  color: var(--text);
  line-height: 1.55;
  word-break: break-word;
  font-size: 13px;
}

.msg-actions {
  opacity: 0;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: auto;
  flex-shrink: 0;
}

.like-btn {
  background: none;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 2px 8px;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all .15s;
}
.like-btn:hover { background: var(--bg3); border-color: var(--pink); color: var(--pink); }
.like-btn.liked { background: rgba(244,114,182,.1); border-color: var(--pink); color: var(--pink); }

.msg-system {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  padding: 6px;
  font-style: italic;
}

.msg-dm {
  margin: 6px 0;
  padding: 10px 14px;
  background: rgba(102,126,234,.1);
  border-left: 2px solid var(--accent);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  font-size: 12.5px;
}
.msg-dm .dm-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 3px;
}

.msg-err { text-align: center; font-size: 11px; color: var(--red);   padding: 4px; }
.msg-ok  { text-align: center; font-size: 11px; color: var(--green); padding: 4px; }

.msg-history-sep {
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  padding: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.msg-history-sep::before, .msg-history-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

/* ── INPUT BAR ── */
.input-bar {
  padding: 12px 16px;
  background: var(--bg1);
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.msg-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 9px 14px;
  color: var(--bright);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  resize: none;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color .15s;
}
.msg-input:focus { border-color: var(--accent); }
.msg-input::placeholder { color: var(--muted); }

.send-btn {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  border-radius: var(--r-sm);
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
  border: none;
  box-shadow: 0 2px 8px rgba(102,126,234,0.3);
}
.send-btn:hover { filter: brightness(1.1); }
.send-btn:disabled { opacity: .4; cursor: default; }

/* ══════════════════════════════════════════════════
   CALL BAR
══════════════════════════════════════════════════ */
.call-bar {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 40px;
  background: rgba(74,222,128,.08);
  border-bottom: 1px solid rgba(74,222,128,.2);
  flex-shrink: 0;
  font-size: 12px;
}
.call-bar.visible    { display: flex; }
.call-bar-label      { color: var(--green); font-weight: 600; flex: 1; }
.call-bar-timer      { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--green); }
.call-bar-end {
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 600;
}
.call-bar-end:hover { background: #fca5a5; color: #1e1e2e; }

/* ══════════════════════════════════════════════════
   MODALS
══════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg1);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
  animation: modalIn .25s cubic-bezier(.16,1,.3,1);
  overflow: hidden;
}

@keyframes modalIn {
  from { opacity:0; transform: scale(.94) translateY(10px); }
  to   { opacity:1; transform: scale(1)   translateY(0); }
}

.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title  { font-size: 14px; font-weight: 600; color: var(--bright); font-family: 'Poppins', sans-serif; }
.modal-close  {
  background: none; border: none;
  color: var(--sub); font-size: 18px; cursor: pointer;
  border-radius: 4px; padding: 0 4px; line-height: 1;
}
.modal-close:hover { color: var(--text); }

.modal-body   { padding: 20px; }
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* DM Modal */

  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 9px 12px;
  color: var(--bright);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  resize: none;
  height: 100px;
  margin-top: 10px;
  transition: border-color .15s;
}

/* Call Modal */
#call-modal .modal { width: 320px; text-align: center; }
.call-modal-icon  { font-size: 48px; margin: 16px 0 12px; }

.call-modal-sub   { font-size: 12px; color: var(--sub); margin-bottom: 20px; }
.call-modal-btns  { display: flex; gap: 10px; padding: 0 20px 20px; }
.call-accept { flex: 1; padding: 10px; background: var(--green); color: #0d1f14; font-weight: 700; border: none; border-radius: var(--r-sm); font-size: 13px; }
.call-accept:hover { background: #86efac; }
.call-reject { flex: 1; padding: 10px; background: var(--red);   color: #fff;    font-weight: 700; border: none; border-radius: var(--r-sm); font-size: 13px; }
.call-reject:hover { background: #fca5a5; color: #1e1e2e; }

/* Profile Modal */
#profile-modal .modal { width: 460px; max-height: 85vh; display: flex; flex-direction: column; }
.profile-cover {
  height: 100px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  flex-shrink: 0;
  position: relative;
}
.profile-avatar-wrap { position: absolute; bottom: -30px; left: 20px; }
.profile-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 3px solid var(--bg1);
  background: var(--bg4);
  display: flex; align-items: center; justify-content: center;

  overflow: hidden;
}
.profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.profile-info { padding: 40px 20px 0; }
.profile-name { font-size: 18px; font-weight: 700; color: var(--bright); font-family: 'Poppins', sans-serif; }
.profile-date { font-size: 11px; color: var(--sub); margin-top: 3px; }
.profile-bio {
  margin: 12px 20px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.5;
  min-height: 50px;
}
#profile-bio-edit {

.profile-posts { flex: 1; overflow-y: auto; padding: 0 20px 16px; min-height: 0; }

}
.post-card {

/* Join room modal */

/* Context menu */
.ctx-menu {
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);

@keyframes ctxIn { from { opacity:0; transform: scale(.95); } to { opacity:1; transform: scale(1); } }

.ctx-item {

     JAVASCRIPT

<script>
// ── Site theme system (mirrors index / search / settings) ─────────────────────

function getCookie(name) {
  const cname = name + "=";
  const decodedCookie = decodeURIComponent(document.cookie);
  const ca = decodedCookie.split(';');
  for (let i = 0; i < ca.length; i++) {
    let c = ca[i].trim();
    if (c.indexOf(cname) === 0) return c.substring(cname.length, c.length);
  }
  return "";
}

function applyTheme(theme) {
  document.body.classList.remove('dark', 'light');
  document.body.style.background = '';
  document.body.style.color = '';
  switch (theme) {
    case 'dark':
      document.body.classList.add('dark');
      break;
    case 'light':
      document.body.classList.add('light');
      break;
    case 'gif':
      document.body.style.background = 'url("images/background.gif") no-repeat center center fixed';
      document.body.style.backgroundSize = 'cover';
      document.body.style.color = 'white';
      break;
    case 'gradient':
    default:
      const gradients = [
        'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        'linear-gradient(135deg, #ff7e5f, #feb47b)',
        'linear-gradient(135deg, #6a11cb, #2575fc)',
        'linear-gradient(135deg, #43cea2, #185a9d)'
      ];
      // Use the saved gradient or default site purple
      document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
      break;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  // Apply site theme
  const savedTheme = getCookie('theme');
  applyTheme(savedTheme || 'gradient');

  // Load site avatar into nav
  const savedAvatar = getCookie('avatar');
  if (savedAvatar) {
    document.getElementById('nav-avatar').src = savedAvatar;
  }

  // Auto-login if session cookie exists
  const savedUser = decodeURIComponent(getCookie('talkon_user') || '');
  const savedPass = decodeURIComponent(getCookie('talkon_pass') || '');
  if (savedUser && savedPass) {
    const { host, port } = getServerAddress();
    pendingAction = 'login';
    pendingUser   = savedUser;
    pendingPass   = savedPass;
    setLoginStatus('Reconnecting…');
    setLoginBtns(true);
    connect(host, port);
  }
});

// ── State ─────────────────────────────────────────────────────────────────────
let ws          = null;
let username    = '';
let currentRoom = 'general';
let pendingAction = null;
let pendingUser = '', pendingPass = '';
let avatarCache = {};
let callState   = null;
let callTimer   = null;
let callSeconds = 0;
let rooms       = new Set(['general']);
let users       = [];
let lastSender  = null;
let lastTs      = null;

// ── WebSocket ─────────────────────────────────────────────────────────────────

function connect(host, port) {
  const url = `ws://${host}:${port}`;
  ws = new WebSocket(url);
  ws.onopen  = () => { setConnDot(true); };
  ws.onclose = () => {
    setConnDot(false);
    if (username) appendSystem('⚠ Disconnected from server');
  };
  ws.onerror = () => {
    setLoginStatus('Connection failed', true);
    setLoginBtns(false);
  };
  ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }
    handlePacket(msg);
  };
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify(obj));
}

// ── Packet handler ────────────────────────────────────────────────────────────

function handlePacket(msg) {
  switch (msg.type) {
    case 'banner':
      if (pendingAction === 'login')    send({ action: 'login',    username: pendingUser, password: pendingPass });
      else if (pendingAction === 'register') send({ action: 'register', username: pendingUser, password: pendingPass });
      break;
    case 'ok':
      if (pendingAction === 'register') {
        setLoginStatus('Registered! Logging in…', false);
        pendingAction = 'login';
        const { host, port } = getServerAddress();
        connect(host, port);
        return;
      }
      if (pendingAction === 'login') {
        username = pendingUser;
        saveSession(pendingUser, pendingPass);
        pendingAction = null;
        showApp();
        return;
      }
      appendOk(msg.text);
      break;
    case 'error':
      if (pendingAction) {
        setLoginStatus(msg.text, true);
        setLoginBtns(false);
        ws.close();
        return;
      }
      appendError(msg.text);
      break;
    case 'message':
      appendMessage(msg.sender, msg.text, msg.ts, msg.id ?? -1, msg.likes ?? 0, msg.liked_by_me ?? false);
      break;
    case 'system':   appendSystem(msg.text); break;
    case 'dm':       appendDm(msg.sender, msg.text, msg.ts, false); break;
    case 'dm_sent':  appendOk(`✓ DM sent to ${msg.to}`); break;
    case 'history':
      appendHistorySep(msg.room);
      (msg.messages || []).forEach(m =>
        appendMessage(m.sender, m.content, m.ts, m.id, m.likes ?? 0, m.liked_by_me ?? false, true));
      appendHistorySep(null);
      break;
    case 'rooms':       renderRooms(msg.rooms || []); break;
    case 'users':       renderUsers(msg.users || []); break;
    case 'avatar':      storeAvatar(msg.username, msg.data); break;
    case 'like_update': updateLikes(msg.id, msg.likes, msg.liked_by_me); break;
    case 'profile':     showProfile(msg); break;
    case 'call_ringing':
      callState = { callId: msg.call_id, peer: msg.to, state: 'ringing' };
      showCallBar('ringing', msg.to);
      break;
    case 'call_incoming':
      if (callState) { send({ action: 'call_reject', call_id: msg.call_id }); return; }
      callState = { callId: msg.call_id, peer: msg.caller, state: 'ringing' };
      showIncomingCall(msg.call_id, msg.caller);
      break;
    case 'call_accepted':
      if (callState) {
        callState.state  = 'active';
        callState.callId = callState.callId || msg.call_id;
        startCallTimer();
        showCallBar('active', callState.peer);
        closeModal('call-modal');
        startAudio();
      }
      break;
    case 'call_rejected':
      endCall();
      toast(`Call rejected by ${msg.by}`);
      break;
    case 'call_ended':
      endCall();
      toast('Call ended');
      appendSystem('📵 Call ended');
      break;
    case 'audio_data':
      receiveAudioChunk(msg.call_id, msg.data);
      break;
  }
}

// ── Login / Register ──────────────────────────────────────────────────────────

function getServerAddress() {
  const host = getCookie('talkon_host') || 'talkon.duckdns.org';
  const port = parseInt(getCookie('talkon_port')) || 8765;
  return { host, port };
}

function saveSession(user, pass) {
  const expires = new Date(Date.now() + 30 * 24 * 3600 * 1000).toUTCString();
  document.cookie = `talkon_user=${encodeURIComponent(user)}; expires=${expires}; path=/`;
  document.cookie = `talkon_pass=${encodeURIComponent(pass)}; expires=${expires}; path=/`;
}

function clearSession() {
  document.cookie = 'talkon_user=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
  document.cookie = 'talkon_pass=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/';
}

function doLogin() {
  const { host, port } = getServerAddress();
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!user || !pass) { setLoginStatus('Fill in all fields', true); return; }
  pendingAction = 'login';
  pendingUser   = user;
  pendingPass   = pass;
  setLoginBtns(true);
  setLoginStatus('Connecting…');
  connect(host, port);
}

function doRegister() {
  const { host, port } = getServerAddress();
  const user = document.getElementById('l-user').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!user || !pass) { setLoginStatus('Fill in all fields', true); return; }
  if (pass.length < 4) { setLoginStatus('Password must be ≥4 chars', true); return; }
  pendingAction = 'register';
  pendingUser   = user;
  pendingPass   = pass;
  setLoginBtns(true);
  setLoginStatus('Connecting…');
  connect(host, port);
}

function setLoginStatus(text, err) {
  const el = document.getElementById('l-status');
  el.textContent = text;
  el.className = 'login-status' + (err ? ' err' : err === false ? ' ok' : '');
}

function setLoginBtns(loading) {
  document.getElementById('l-login-btn').disabled    = loading;
  document.getElementById('l-reg-btn').disabled      = loading;
  document.getElementById('l-login-btn').textContent = loading ? 'Connecting…' : 'Login';
}

function doLogout() {
  if (ws) ws.close();
  clearSession();
  username = '';
  currentRoom = 'general';
  rooms = new Set(['general']);
  users = [];
  avatarCache = {};
  callState = null;
  clearInterval(callTimer);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('messages').innerHTML   = '';
  document.getElementById('rooms-list').innerHTML = '';
  document.getElementById('users-list').innerHTML = '';
  setLoginBtns(false);
  setLoginStatus('');
}

// ── Show app ──────────────────────────────────────────────────────────────────

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('me-name').textContent = username;
  setMeAvatar(username);
  setConnDot(true);
  document.getElementById('msg-input').placeholder = `Message #${currentRoom}…`;
  send({ action: 'rooms' });
}

function setConnDot(on) {
  document.getElementById('conn-dot').className = 'conn-dot' + (on ? ' online' : '');
}

// ── Message rendering ─────────────────────────────────────────────────────────

function appendMessage(sender, text, ts, id, likes, likedByMe, fromHistory) {
  const container   = document.getElementById('messages');
  const tsFormatted = fmtTs(ts);
  const showHeader  = sender !== lastSender;
  lastSender = sender;

  const row = document.createElement('div');
  row.className = 'msg-row';
  if (id >= 0) row.dataset.msgId = id;

  const avWrap = document.createElement('div');
  avWrap.className = 'msg-avatar' + (showHeader ? '' : ' ghost');
  if (showHeader) {
    avWrap.className += ' ' + avClass(sender);
    avWrap.textContent = initials(sender);
    avWrap.title = sender;
    avWrap.onclick = () => openProfile(sender);
    const cached = avatarCache[sender];
    if (cached) avWrap.innerHTML = `<img src="${cached}" alt="${sender}">`;
  }

  const body = document.createElement('div');
  body.className = 'msg-body';

  if (showHeader) {
    const meta     = document.createElement('div');
    meta.className = 'msg-meta';
    const senderEl = document.createElement('span');
    senderEl.className   = 'msg-sender';
    senderEl.style.color = senderColor(sender);
    senderEl.textContent = sender;
    senderEl.onclick = () => openProfile(sender);
    const timeEl = document.createElement('span');
    timeEl.className   = 'msg-time';
    timeEl.textContent = tsFormatted;
    meta.appendChild(senderEl);
    meta.appendChild(timeEl);
    body.appendChild(meta);
  }

  const textEl = document.createElement('div');
  textEl.className   = 'msg-text';
  textEl.textContent = text;
  body.appendChild(textEl);

  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  if (id >= 0) {
    const likeBtn = document.createElement('button');
    likeBtn.className = 'like-btn' + (likedByMe ? ' liked' : '');
    likeBtn.innerHTML = `❤ ${likes > 0 ? likes : ''}`;
    likeBtn.dataset.id = id;
    likeBtn.onclick = () => send({ action: 'like_message', id });
    actions.appendChild(likeBtn);
  }

  row.appendChild(avWrap);
  row.appendChild(body);
  row.appendChild(actions);
  container.appendChild(row);
  scrollBottom();
}

function appendSystem(text) {
  lastSender = null;
  const el = document.createElement('div');
  el.className   = 'msg-system';
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function appendDm(sender, text, ts, sent) {
  lastSender = null;
  const el = document.createElement('div');
  el.className = 'msg-dm';
  el.innerHTML = `<div class="dm-label">DM ${sent ? '→' : '←'} ${escHtml(sender)}</div>
                  <div>${escHtml(text)}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function appendOk(text) {
  const el = document.createElement('div');
  el.className   = 'msg-ok';
  el.textContent = text;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function appendError(text) {
  const el = document.createElement('div');
  el.className   = 'msg-err';
  el.textContent = '⚠ ' + text;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function appendHistorySep(room) {
  lastSender = null;
  const el = document.createElement('div');
  el.className   = 'msg-history-sep';
  el.textContent = room ? `— History: #${room} —` : '— End of history —';
  document.getElementById('messages').appendChild(el);
}

function updateLikes(id, likes, likedByMe) {
  document.querySelectorAll(`.like-btn[data-id="${id}"]`).forEach(btn => {
    btn.className = 'like-btn' + (likedByMe ? ' liked' : '');
    btn.innerHTML = `❤ ${likes > 0 ? likes : ''}`;
  });
}

// ── Sidebar rendering ─────────────────────────────────────────────────────────

function renderRooms(list) {
  list.forEach(r => rooms.add(r));
  const el = document.getElementById('rooms-list');
  el.innerHTML = '';
  [...rooms].sort().forEach(r => {
    const li = document.createElement('li');
    li.className = 'sidebar-item' + (r === currentRoom ? ' active' : '');
    li.innerHTML = `<span class="sidebar-item-icon">#</span> ${escHtml(r)}`;
    li.onclick = () => switchRoom(r);
    li.oncontextmenu = (e) => { e.preventDefault(); showRoomCtx(e, r); };
    el.appendChild(li);
  });
}

function renderUsers(list) {
  users = list;
  const el = document.getElementById('users-list');
  el.innerHTML = '';
  list.forEach(u => {
    const li = document.createElement('li');
    li.className = 'sidebar-item';
    const avDiv = document.createElement('div');
    avDiv.style.cssText = 'width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;overflow:hidden;';
    avDiv.className = avClass(u);
    avDiv.textContent = initials(u);
    avDiv.dataset.avUser = u;
    if (avatarCache[u]) avDiv.innerHTML = `<img src="${avatarCache[u]}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    const nameSpan = document.createElement('span');
    nameSpan.textContent = u;
    nameSpan.style.overflow = 'hidden';
    nameSpan.style.textOverflow = 'ellipsis';
    nameSpan.style.whiteSpace = 'nowrap';
    li.appendChild(avDiv);
    li.appendChild(nameSpan);
    li.onclick = () => openProfile(u);
    li.oncontextmenu = (e) => { e.preventDefault(); showUserCtx(e, u); };
    el.appendChild(li);
    if (!avatarCache[u]) send({ action: 'get_avatar', username: u });
  });
}

function switchRoom(room) {
  currentRoom = room;
  lastSender  = null;
  document.getElementById('chat-title').textContent = `# ${room}`;
  document.getElementById('msg-input').placeholder = `Message #${room}…`;
  document.getElementById('messages').innerHTML = '';
  renderRooms([]);
  send({ action: 'join', room });
}

function openJoinModal() {
  openModal('join-modal');
  setTimeout(() => document.getElementById('join-room-input').focus(), 50);
}

function joinRoom() {
  const room = document.getElementById('join-room-input').value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!room) return;
  rooms.add(room);
  closeModal('join-modal');
  document.getElementById('join-room-input').value = '';
  switchRoom(room);
}

function refreshUsers() { send({ action: 'users' }); }

// ── Messaging ─────────────────────────────────────────────────────────────────

function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;
  appendMessage(username, text, new Date().toISOString(), -1, 0, false);
  send({ action: 'message', text });
  input.value = '';
  autoResize(input);
}

function onInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── DM ────────────────────────────────────────────────────────────────────────

function openDmModal(prefill) {
  openModal('dm-modal');
  if (prefill) document.getElementById('dm-to').value = prefill;
  setTimeout(() => {
    if (prefill) document.getElementById('dm-text').focus();
    else         document.getElementById('dm-to').focus();
  }, 50);
}

function sendDm() {
  const to   = document.getElementById('dm-to').value.trim();
  const text = document.getElementById('dm-text').value.trim();
  if (!to || !text) return;
  send({ action: 'dm', to, text });
  appendDm(to, text, new Date().toISOString(), true);
  document.getElementById('dm-text').value = '';
  closeModal('dm-modal');
}

// ── Profile ───────────────────────────────────────────────────────────────────

function openProfile(user) {
  send({ action: 'get_profile', username: user });
  document.getElementById('profile-name').textContent = user;
  document.getElementById('profile-date').textContent = 'Loading…';
  document.getElementById('profile-bio-view').textContent = '';
  document.getElementById('profile-posts').innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0">Loading…</div>';
  const av = document.getElementById('profile-avatar');
  av.className   = 'profile-avatar ' + avClass(user);
  av.textContent = initials(user);
  av.style.color = '#fff';
  const isOwn = user === username;
  document.getElementById('profile-edit-btn').style.display   = isOwn ? '' : 'none';
  document.getElementById('profile-save-btn').style.display   = 'none';
  document.getElementById('profile-avatar-btn').style.display = isOwn ? '' : 'none';
  document.getElementById('profile-bio-edit').style.display   = 'none';
  document.getElementById('profile-bio-view').style.display   = '';
  openModal('profile-modal');
}

function openMyProfile() { openProfile(username); }

function showProfile(msg) {
  document.getElementById('profile-name').textContent = msg.username;
  document.getElementById('profile-date').textContent = `🗓 Joined ${fmtDate(msg.created)}`;
  document.getElementById('profile-bio-view').textContent = msg.description || '(no bio yet)';
  document.getElementById('profile-bio-edit').value = msg.description || '';
  const av = document.getElementById('profile-avatar');
  if (msg.avatar) {
    av.innerHTML = `<img src="data:image/png;base64,${msg.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    storeAvatar(msg.username, msg.avatar);
  } else {
    av.className   = 'profile-avatar ' + avClass(msg.username);
    av.textContent = initials(msg.username);
  }
  const feed = document.getElementById('profile-posts');
  feed.innerHTML = `<div class="profile-posts-label">Recent Posts (${(msg.posts||[]).length})</div>`;
  if (!msg.posts || !msg.posts.length) {
    feed.innerHTML += '<div style="color:var(--muted);font-size:12px;">No posts yet.</div>';
    return;
  }
  [...msg.posts].reverse().forEach(p => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `<div class="post-card-meta">in <span>#${escHtml(p.room)}</span>  ·  ${fmtDate(p.ts)}</div>
                      <div class="post-card-text">${escHtml(p.content)}</div>`;
    feed.appendChild(card);
  });
}

function toggleBioEdit() {
  const view    = document.getElementById('profile-bio-view');
  const edit    = document.getElementById('profile-bio-edit');
  const saveBtn = document.getElementById('profile-save-btn');
  const editBtn = document.getElementById('profile-edit-btn');
  const isEditing = edit.style.display !== 'none';
  view.style.display    = isEditing ? '' : 'none';
  edit.style.display    = isEditing ? 'none' : '';
  saveBtn.style.display = isEditing ? 'none' : '';
  editBtn.textContent   = isEditing ? 'Edit' : 'Cancel';
}

function saveBio() {
  const bio = document.getElementById('profile-bio-edit').value.trim();
  send({ action: 'set_profile', description: bio });
  document.getElementById('profile-bio-view').textContent = bio || '(no bio yet)';
  toggleBioEdit();
  toast('Bio saved!');
}

function triggerAvatarUpload() { document.getElementById('avatar-upload').click(); }

function uploadAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.type !== 'image/png') { toast('Only PNG files supported'); return; }
  if (file.size > 192 * 1024)   { toast('Max 192 KB PNG'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    const b64 = e.target.result.split(',')[1];
    send({ action: 'set_avatar', data: b64 });
    storeAvatarB64(username, b64);
    setMeAvatar(username);
    toast('Avatar updated!');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ── Avatar helpers ────────────────────────────────────────────────────────────

function storeAvatar(user, b64) { if (!b64) return; storeAvatarB64(user, b64); }

function storeAvatarB64(user, b64) {
  const src = b64.startsWith('data:') ? b64 : `data:image/png;base64,${b64}`;
  avatarCache[user] = src;
  document.querySelectorAll(`[data-av-user="${user}"]`).forEach(el => {
    el.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  });
  if (user === username) setMeAvatar(username);
}

function setMeAvatar(user) {
  const el = document.getElementById('me-avatar');
  if (avatarCache[user]) {
    el.innerHTML = `<img src="${avatarCache[user]}">`;
  } else {
    el.className   = 'me-avatar ' + avClass(user);
    el.textContent = initials(user);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  AUDIO CALL ENGINE  (16 kHz · 16-bit signed PCM · mono · 20 ms · base64)
// ══════════════════════════════════════════════════════════════════════════════

const CALL_SAMPLE_RATE   = 16000;
const CALL_CHUNK_MS      = 20;
const CALL_CHUNK_SAMPLES = CALL_SAMPLE_RATE * CALL_CHUNK_MS / 1000; // 320

let audioCtx     = null;
let micStream    = null;
let micSource    = null;
let scriptNode   = null;
let sampleBuffer = new Float32Array(0);
let nextPlayTime = 0;

async function startAudio() {
  try {
    audioCtx = new AudioContext({ sampleRate: CALL_SAMPLE_RATE });
    await audioCtx.resume();
    micStream = await navigator.mediaDevices.getUserMedia({ audio: {
      sampleRate: CALL_SAMPLE_RATE, channelCount: 1,
      echoCancellation: true, noiseSuppression: true, autoGainControl: true,
    }, video: false });
    micSource  = audioCtx.createMediaStreamSource(micStream);
    scriptNode = audioCtx.createScriptProcessor(1024, 1, 1);
    scriptNode.onaudioprocess = (e) => {
      if (!callState || callState.state !== 'active') return;
      const input  = e.inputBuffer.getChannelData(0);
      const merged = new Float32Array(sampleBuffer.length + input.length);
      merged.set(sampleBuffer);
      merged.set(input, sampleBuffer.length);
      sampleBuffer = merged;
      while (sampleBuffer.length >= CALL_CHUNK_SAMPLES) {
        const chunk = sampleBuffer.slice(0, CALL_CHUNK_SAMPLES);
        sampleBuffer = sampleBuffer.slice(CALL_CHUNK_SAMPLES);
        sendAudioChunk(chunk);
      }
    };
    micSource.connect(scriptNode);
    scriptNode.connect(audioCtx.destination);
    nextPlayTime = audioCtx.currentTime + 0.08;
    appendSystem('🎙 Audio connected');
  } catch (err) {
    appendError(`Microphone error: ${err.message}`);
    endCall();
  }
}

function sendAudioChunk(float32Chunk) {
  const int16 = new Int16Array(float32Chunk.length);
  for (let i = 0; i < float32Chunk.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Chunk[i]));
    int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  send({ action: 'audio_data', call_id: callState.callId, data: arrayBufferToBase64(int16.buffer) });
}

function receiveAudioChunk(callId, b64) {
  if (!callState || callState.callId !== callId || callState.state !== 'active') return;
  if (!audioCtx) return;
  const int16  = new Int16Array(base64ToArrayBuffer(b64));
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++)
    float32[i] = int16[i] / (int16[i] < 0 ? 0x8000 : 0x7FFF);
  const buf = audioCtx.createBuffer(1, float32.length, CALL_SAMPLE_RATE);
  buf.copyToChannel(float32, 0);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  if (nextPlayTime < now + 0.01) nextPlayTime = now + 0.05;
  src.start(nextPlayTime);
  nextPlayTime += buf.duration;
}

function stopAudio() {
  sampleBuffer = new Float32Array(0);
  nextPlayTime = 0;
  if (scriptNode) { scriptNode.disconnect(); scriptNode.onaudioprocess = null; scriptNode = null; }
  if (micSource)  { micSource.disconnect(); micSource = null; }
  if (micStream)  { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx)   { audioCtx.close(); audioCtx = null; }
}

function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function base64ToArrayBuffer(b64) {
  const bin  = atob(b64);
  const buf  = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

// ── Call control ──────────────────────────────────────────────────────────────

function initiateCall(user) {
  if (callState) { toast('Already in a call'); return; }
  send({ action: 'call_invite', to: user });
  callState = { peer: user, state: 'ringing', callId: null };
  showCallBar('ringing', user);
  toast(`Calling ${user}…`);
}

function showIncomingCall(callId, caller) {
  document.getElementById('call-modal-caller').textContent = caller;
  openModal('call-modal');
}

function acceptCall() {
  if (!callState) return;
  send({ action: 'call_accept', call_id: callState.callId });
  closeModal('call-modal');
}

function rejectCall() {
  if (!callState) return;
  send({ action: 'call_reject', call_id: callState.callId });
  callState = null;
  closeModal('call-modal');
}

function hangup() {
  if (!callState) return;
  send({ action: 'call_hangup', call_id: callState.callId });
  endCall();
  appendSystem('📵 Call ended');
}

function endCall() {
  stopAudio();
  callState = null;
  clearInterval(callTimer);
  callTimer   = null;
  callSeconds = 0;
  document.getElementById('call-bar').classList.remove('visible');
}

function showCallBar(state, peer) {
  const bar   = document.getElementById('call-bar');
  const label = document.getElementById('call-bar-label');
  const timer = document.getElementById('call-bar-timer');
  bar.classList.add('visible');
  label.textContent = state === 'ringing' ? `📳 Calling ${peer}…` : `📞 In call with ${peer}`;
  timer.textContent = '';
}

function startCallTimer() {
  callSeconds = 0;
  const timerEl = document.getElementById('call-bar-timer');
  clearInterval(callTimer);
  callTimer = setInterval(() => {
    callSeconds++;
    const m = Math.floor(callSeconds / 60);
    const s = callSeconds % 60;
    timerEl.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

// ── Context menus ─────────────────────────────────────────────────────────────

function showRoomCtx(e, room) {
  document.getElementById('ctx-menu').innerHTML =
    `<div class="ctx-item" onclick="switchRoom('${escAttr(room)}'); hideCtx()">💬 Switch to #${escHtml(room)}</div>`;
  showCtxAt(e.clientX, e.clientY);
}

function showUserCtx(e, user) {
  const callItem = user !== username
    ? `<div class="ctx-item" onclick="initiateCall('${escAttr(user)}'); hideCtx()">📞 Call ${escHtml(user)}</div>
       <div class="ctx-item" onclick="openDmModal('${escAttr(user)}'); hideCtx()">✉ DM ${escHtml(user)}</div>`
    : '';
  document.getElementById('ctx-menu').innerHTML =
    `<div class="ctx-item" onclick="openProfile('${escAttr(user)}'); hideCtx()">👤 View Profile</div>${callItem}`;
  showCtxAt(e.clientX, e.clientY);
}

function showCtxAt(x, y) {
  const menu = document.getElementById('ctx-menu');
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  menu.classList.add('open');
}
function hideCtx() { document.getElementById('ctx-menu').classList.remove('open'); }
document.addEventListener('click', hideCtx);

// ── Modals ────────────────────────────────────────────────────────────────────

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ── Toast ─────────────────────────────────────────────────────────────────────

let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Utilities ─────────────────────────────────────────────────────────────────

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function fmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso.length > 10 ? iso : iso + 'T00:00:00Z');
  if (isNaN(d)) return iso.slice(0, 10);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
}

function initials(name) {
  if (!name) return '?';
  const parts = name.split(/\s+/);
  return parts.length >= 2 ? (parts[0][0] + parts[1][0]).toUpperCase() : name.slice(0, 2).toUpperCase();
}

const AV_COLORS = ['av-0','av-1','av-2','av-3','av-4','av-5','av-6','av-7','av-8','av-9'];
function avClass(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return AV_COLORS[Math.abs(h) % AV_COLORS.length];
}

const SENDER_COLORS = ['#a395ff','#22d3ee','#4ade80','#f472b6','#fbbf24','#f87171','#818cf8','#34d399','#fb923c','#e879f9'];
function senderColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return SENDER_COLORS[Math.abs(h) % SENDER_COLORS.length];
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/'/g, "\\'"); }

// ── Enter key on login ────────────────────────────────────────────────────────
document.getElementById('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('l-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('l-pass').focus(); });
</script>
